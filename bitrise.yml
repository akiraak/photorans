format_version: "21"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: ios

meta:
  bitrise.io:
    stack: osx-xcode-16.0.x
    machine_type_id: g2-m1.4core

app:
  envs:
  - BITRISE_PROJECT_PATH: ios/Photorans.xcodeproj
  - BITRISE_SCHEME: Photorans
  - BITRISE_CONFIGURATION: Debug

# 手動ビルドのみ。git push では一切発火しない。
# 起動方法:
#   - Bitrise Web UI の "Start build" ボタン
#   - API: curl https://api.bitrise.io/v0.1/apps/<APP_SLUG>/builds ...
trigger_map: []

workflows:
  primary:
    description: |-
      リポジトリにコミット済みの ios/Photorans.xcodeproj を使い、
      iPhone 16 シミュレータ向けに未署名ビルドする。
      アーカイブ・署名は行わない (Phase6 で release を追加)。
      .xcodeproj は WSL2 上の XcodeGen Linux ビルドで再生成する想定で、
      CI 側では生成ステップを持たない。
    steps:
    - git-clone@8: {}
    - xcode-build-for-simulator@0:
        inputs:
        - project_path: $BITRISE_PROJECT_PATH
        - scheme: $BITRISE_SCHEME
        - configuration: $BITRISE_CONFIGURATION
        - simulator_device: iPhone 16
        - simulator_os_version: latest
    - deploy-to-bitrise-io@2: {}
