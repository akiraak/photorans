name: Photorans

options:
  bundleIdPrefix: com.akiraak
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: ja
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG

targets:
  Photorans:
    type: application
    platform: iOS
    sources:
      - path: Photorans
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.akiraak.photorans
        PRODUCT_NAME: Photorans
        INFOPLIST_FILE: Photorans/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"

  PhotoransTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PhotoransTests
        excludes:
          - "**/*.sh"
    dependencies:
      - target: Photorans
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.akiraak.photorans.tests
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Photorans.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Photorans

schemes:
  Photorans:
    build:
      targets:
        Photorans: all
        PhotoransTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PhotoransTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
